body{background:#0a0400;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Press Start 2P',monospace}

.cn .qnl{color:#22c55e}.wn .qnl{color:#ef4444}

.school-entry{margin:0 0 14px}
.school-entry .label{font-size:7px;color:#aa9060;margin:0 0 8px}
.school-input{font-family:'Press Start 2P',monospace;font-size:12px;width:160px;padding:6px 10px;border:2px solid #F5C440;border-radius:3px;background:rgba(245,196,64,0.05);color:#F5C440;text-align:center;text-transform:uppercase;letter-spacing:2px}

.lb-tabs{display:flex;gap:0;justify-content:center;margin:0 0 8px}
.lb-tab{font-family:'Press Start 2P',monospace;font-size:6px;padding:5px 12px;border:1.5px solid rgba(245,196,64,0.3);background:transparent;color:#aa9060;cursor:pointer;transition:all .15s}

.lb-tab.active{background:rgba(245,196,64,0.15);color:#F5C440;border-color:#F5C440}

<script>

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var globalScores = [];
var schoolScores = [];
var schoolCode = "";
var schoolListener = null;

// Listen for global scores
db.ref("leaderboard").orderByChild("score").limitToLast(50).on("value", function(snap) {
  globalScores = [];
  snap.forEach(function(child) { globalScores.push(child.val()); });
  globalScores.sort(function(a, b) { return b.score - a.score; });
  var totalCount = globalScores.length;
  var schoolCount = schoolScores.length;
  document.getElementById("db-status").textContent = "Connected \u2022 " + totalCount + " scores globally";
});

function listenToSchool(code) {
  if (schoolListener) { db.ref("schools/" + schoolListener).off(); }
  schoolListener = code;
  schoolScores = [];
  if (!code) return;
  db.ref("schools/" + code).orderByChild("score").limitToLast(50).on("value", function(snap) {
    schoolScores = [];
    snap.forEach(function(child) { schoolScores.push(child.val()); });
    schoolScores.sort(function(a, b) { return b.score - a.score; });
  });
}

function saveToDB(entry) {
  var promises = [db.ref("leaderboard").push(entry)];
  if (schoolCode) {
    promises.push(db.ref("schools/" + schoolCode).push(entry));
  }
  return Promise.all(promises);
}

// IP lookup for accountability
function getIP(callback){
  try{
    fetch("https://api.ipify.org?format=json").then(function(r){return r.json();}).then(function(d){callback(d.ip);}).catch(function(){callback("unknown");});
  }catch(e){callback("unknown");}
}

// School code handling
var schoolInput = document.getElementById("school-input");
var savedCode = localStorage.getItem("vesuvius-school") || "";
if (savedCode) {
  schoolInput.value = savedCode;
  schoolCode = savedCode.toUpperCase().replace(/[^A-Z0-9]/g,"");
  document.getElementById("school-display").textContent = schoolCode;
  listenToSchool(schoolCode);
}
schoolInput.addEventListener("input", function() {
  schoolCode = this.value.toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,6);
  this.value = schoolCode;
  document.getElementById("school-display").textContent = schoolCode ? schoolCode : "";
  localStorage.setItem("vesuvius-school", schoolCode);
  listenToSchool(schoolCode);
});

var levels=[
  {name:"I",label:"LEVEL I",mt:0,sr:0.05,sn:1.6,sx:2.6,col:"#aa9060"},

];
function getLevel(t){for(var i=levels.length-1;i>=0;i--)if(t>=levels[i].mt)return levels[i];return levels[0];}

var Qs=[
// ===== 1ST DECLENSION NOUNS (f.) =====
{w:"puella",p:"What case?",a:"Nominative",o:["Nominative","Accusative","Ablative","Genitive"],n:"1st decl. nom. sing.: -a. Subject of the sentence."},
{w:"puellam",p:"What case?",a:"Accusative",o:["Nominative","Accusative","Ablative","Dative"],n:"1st decl. acc. sing.: -am always = accusative. Direct object."},
{w:"puellae",p:"What case could this be?",a:"Genitive singular",o:["Genitive singular","Accusative plural","Ablative singular","Nominative singular"],n:"1st decl. -ae = gen. sing., dat. sing., OR nom. plural. Classic GCSE ambiguity!"},

{w:"puellas",p:"What case?",a:"Accusative",o:["Nominative","Accusative","Genitive","Ablative"],n:"1st decl. acc. pl.: -as always = accusative plural."},
{w:"puellarum",p:"What case?",a:"Genitive",o:["Nominative","Genitive","Accusative","Ablative"],n:"1st decl. gen. pl.: -arum = 'of the girls'. Unmistakable ending."},
{w:"puellis",p:"What case?",a:"Dative",o:["Nominative","Genitive","Dative","Accusative"],n:"1st decl. dat./abl. pl.: -is serves both. 'To/for the girls' or 'by/with the girls'."},

function drawPlayer(x){var y=GY-PH;PX(x+8,y,8,4,"#e8c090");PX(x+6,y+4,12,8,"#e8c090");PX(x+9,y+6,2,2,"#1a0a00");PX(x+13,y+6,2,2,"#1a0a00");PX(x+10,y+9,4,1,"#c07050");PX(x+4,y+12,16,12,"#c0392b");PX(x+6,y+13,12,10,"#a02020");PX(x+2,y+13,4,8,"#c0392b");PX(x+18,y+13,4,8,"#c0392b");PX(x+6,y+24,4,6,"#8B6914");PX(x+14,y+24,4,6,"#8B6914");PX(x+5,y+28,6,2,"#6B4914");PX(x+13,y+28,6,2,"#6B4914");PX(x+2,y+1,20,4,"#F5C440");PX(x+4,y-2,16,3,"#D4A030");}

function drawEmbers(){var t=Date.now()/1000;embers.forEach(function(e){e.x+=e.vx+Math.sin(t+e.a*10)*.2;e.y+=e.vy-(cL?cL.ms*.02:0);if(e.y<-5){e.y=H+5;e.x=Math.random()*W;}if(e.x<0)e.x=W;if(e.x>W)e.x=0;X.fillStyle="rgba(255,"+Math.round(100+e.a*80)+",20,"+(0.3+Math.sin(t*3+e.a*7)*.2)+")";X.fillRect(Math.round(e.x),Math.round(e.y),e.s,e.s);});}

function spawnLava(){if(!cL)return;for(var attempt=0;attempt<2;attempt++){if(Math.random()<cL.sr){var x;if(Math.random()<0.35){x=plx+(Math.random()-0.5)*100;}else{x=Math.random()*(W-16);}x=Math.max(0,Math.min(W-16,x));ld.push({x:x,y:-20,w:10+Math.random()*10,h:10+Math.random()*10,vy:cL.sn+Math.random()*(cL.sx-cL.sn),gl:Math.random(),rot:Math.random()*6.28});}}}

function drawLava(){ld.forEach(function(d){X.save();X.translate(d.x+d.w/2,d.y+d.h/2);X.rotate(d.rot);var cols=["#cc2200","#e84400","#ff6600","#ff8800"];X.fillStyle=cols[Math.floor(d.gl*cols.length)];X.fillRect(-d.w/2,-d.h/2,d.w,d.h);X.fillStyle="#ffcc00";X.fillRect(-d.w/2+2,-d.h/2+2,d.w-4,d.h-4);X.fillStyle="#ffee88";X.fillRect(-d.w/2+3,-d.h/2+3,d.w-6,2);X.restore();d.rot+=.02;});}

function drawPt(){pt=pt.filter(function(p){return p.life>0});pt.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life--;var a=p.life/p.ml;X.fillStyle="rgba(255,"+Math.round(80+p.life*6)+",0,"+a+")";X.fillRect(Math.round(p.x),Math.round(p.y),2+Math.round(a*2),2+Math.round(a*2));});}

function explode(x,y){for(var i=0;i<18;i++){var ml=15+Math.random()*12;pt.push({x:x,y:y,vx:(Math.random()-.5)*5,vy:-1-Math.random()*4,life:ml,ml:ml});}}

function hitTest(){if(Date.now()<immuneUntil)return;var py=GY-PH;for(var i=ld.length-1;i>=0;i--){var d=ld[i];if(d.y+d.h>=py&&d.y<=GY&&d.x+d.w>plx+2&&d.x<plx+PW-2){explode(d.x+d.w/2,d.y+d.h/2);ld.splice(i,1);askQ();return;}}}

var ky={};document.addEventListener("keydown",function(e){ky[e.key]=true;if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].indexOf(e.key)>-1)e.preventDefault();});document.addEventListener("keyup",function(e){ky[e.key]=false;});
var td=0;C.addEventListener("touchstart",function(e){var r=C.getBoundingClientRect();td=(e.touches[0].clientX-r.left)/r.width*W<W/2?-1:1;e.preventDefault();},{passive:false});C.addEventListener("touchmove",function(e){var r=C.getBoundingClientRect();td=(e.touches[0].clientX-r.left)/r.width*W<W/2?-1:1;e.preventDefault();},{passive:false});C.addEventListener("touchend",function(){td=0;});

function mP(){var dx=0;if(ky["ArrowLeft"]||ky["a"])dx-=6;if(ky["ArrowRight"]||ky["d"])dx+=6;if(td)dx=td*6;plx=Math.max(0,Math.min(W-PW,plx+dx));}
function uL(){for(var i=ld.length-1;i>=0;i--){ld[i].y+=ld[i].vy;if(ld[i].y>GY){explode(ld[i].x+ld[i].w/2,GY);ld.splice(i,1);}}}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function askQ(){
if(uq.length>=Qs.length)uq=[];var pool=Qs.filter(function(_,i){return uq.indexOf(i)<0});var qi=Qs.indexOf(pool[Math.floor(Math.random()*pool.length)]);uq.push(qi);cq=Qs[qi];qa=true;lk=false;
document.getElementById("ov2").classList.add("on");document.getElementById("qb").style.display="";
document.getElementById("qw").textContent=cq.w;document.getElementById("qp").textContent=cq.p;
document.getElementById("qn").className="qn";document.getElementById("spd").className="spd";document.getElementById("spd").textContent="";
var bar=document.getElementById("q-timer-bar");bar.style.width="100%";bar.className="q-timer-bar";
var oe=document.getElementById("qo");oe.innerHTML="";
shuffle(cq.o).forEach(function(o){var btn=document.createElement("button");btn.textContent=o;btn.onclick=function(){hA(o,btn)};oe.appendChild(btn);});
// Start countdown
qTimeLimit=getQTimeLimit();qStartTime=Date.now();
if(qTimer)clearInterval(qTimer);
qTimer=setInterval(function(){
  if(lk)return;
  var left=(qTimeLimit*1000-(Date.now()-qStartTime))/1000;
  var pct=Math.max(0,(left/qTimeLimit)*100);
  bar.style.width=pct+"%";
  bar.className="q-timer-bar"+(pct<25?" urgent":pct<50?" warning":"");
  if(left<=0){clearInterval(qTimer);qTimer=null;timeOut();}
},50);
}

function timeOut(){
if(lk)return;lk=true;
document.querySelectorAll("#qo button").forEach(function(b){
  if(b.textContent===cq.a)b.className="cfl";
  else b.className="dim";
});
var ne=document.getElementById("qn"),nl=document.getElementById("qnl"),nt=document.getElementById("qnt");
lv--;st=0;sk=12;
nl.textContent="Time\u2019s up! The answer was: "+cq.a;nt.textContent=cq.n;ne.className="qn wn";
document.getElementById("hl").classList.add("lives-lost");
setTimeout(function(){document.getElementById("hl").classList.remove("lives-lost")},300);
uHUD();
setTimeout(function(){qa=false;immuneUntil=Date.now()+2000;document.getElementById("qb").style.display="none";document.getElementById("ov2").classList.remove("on");if(lv<=0)endG();},4000);
}

function hA(ans,btn){
if(lk)return;lk=true;
if(qTimer){clearInterval(qTimer);qTimer=null;}
var ok=ans===cq.a;
document.querySelectorAll("#qo button").forEach(function(b){if(b.textContent===cq.a)b.className="cfl";else if(b===btn&&!ok)b.className="wfl";if(b.textContent!==cq.a&&b!==btn)b.className="dim";});
var ne=document.getElementById("qn"),nl=document.getElementById("qnl"),nt=document.getElementById("qnt");
if(ok){sc++;st++;if(st>bs)bs=st;nl.textContent="Correct! \u2713";nt.textContent=cq.n;ne.className="qn cn";
}else{lv--;st=0;sk=12;nl.textContent="Not quite \u2014 here\u2019s why:";nt.textContent=cq.n;ne.className="qn wn";document.getElementById("hl").classList.add("lives-lost");setTimeout(function(){document.getElementById("hl").classList.remove("lives-lost")},300);}
uHUD();setTimeout(function(){qa=false;immuneUntil=Date.now()+2000;document.getElementById("qb").style.display="none";document.getElementById("ov2").classList.remove("on");if(lv<=0)endG();},ok?2000:4000);
}

function uHUD(){var total=sc+survivalBonus;document.getElementById("hs").textContent="SCORE "+total;var h="";for(var i=0;i<Math.max(0,lv);i++)h+="\u2665 ";document.getElementById("hl").textContent=h.trim()||"\u2620";document.getElementById("hk").textContent="STREAK "+st;var mins=Math.floor(elapsed/60);var secs=Math.floor(elapsed%60);document.getElementById("ht").textContent=mins+":"+(secs<10?"0":"")+secs;if(cL){var el=document.getElementById("hlvl");el.textContent=cL.label;el.style.color=cL.col;}}

// Initials
function buildInit(){initials=[0,0,0];var c=document.getElementById("init-slots");c.innerHTML="";for(var i=0;i<3;i++){(function(idx){var s=document.createElement("div");s.className="init-slot";var u=document.createElement("button");u.textContent="\u25B2";u.onclick=function(){initials[idx]=(initials[idx]+1)%26;uInit();};var l=document.createElement("div");l.className="init-letter";l.id="il-"+idx;l.textContent="A";var d=document.createElement("button");d.textContent="\u25BC";d.onclick=function(){initials[idx]=(initials[idx]+25)%26;uInit();};s.appendChild(u);s.appendChild(l);s.appendChild(d);c.appendChild(s);})(i);}}
function uInit(){for(var i=0;i<3;i++)document.getElementById("il-"+i).textContent=CHARS[initials[i]];}
function getInit(){return CHARS[initials[0]]+CHARS[initials[1]]+CHARS[initials[2]];}

// Leaderboard
function renderLB(id,hlName,hlScore){
var el=document.getElementById(id);
var hasSchool=schoolCode&&schoolScores.length>0;
var html='';
if(schoolCode){
html+='<div class="lb-tabs"><button class="lb-tab active" onclick="switchTab(this,\''+id+'\',\'school\')">'+schoolCode+'</button><button class="lb-tab" onclick="switchTab(this,\''+id+'\',\'global\')">GLOBAL</button></div>';
}
html+='<div id="'+id+'-school"'+(schoolCode?'':' style="display:none"')+'>';
html+=buildTable(schoolCode?schoolScores:[], hlName, hlScore, schoolCode?schoolCode+" SCORES":"");
html+='</div>';
html+='<div id="'+id+'-global"'+(schoolCode?' style="display:none"':'')+'>';
html+=buildTable(globalScores, hlName, hlScore, "GLOBAL SCORES");
html+='</div>';
el.innerHTML=html;el.style.display="block";
}

function buildTable(scores, hlName, hlScore, title){
var top10=scores.slice(0,10);
var h='<h3>\u2014 '+(title||'HIGH SCORES')+' \u2014</h3><div class="lb-table"><div class="lb-row header"><span class="rank">#</span><span class="name">NAME</span><span class="lb-score">SCORE</span><span class="lb-lvl">LEVEL</span></div>';
if(!top10.length)h+='<div class="no-scores">No scores yet!</div>';
else top10.forEach(function(e,i){var hl=hlName&&e.name===hlName&&e.score===hlScore?"hl":"";h+='<div class="lb-row '+hl+'"><span class="rank">'+(i+1)+'</span><span class="name">'+e.name+'</span><span class="lb-score">'+e.score+'</span><span class="lb-lvl">'+e.level+'</span></div>';});
h+='</div>';return h;
}

function switchTab(btn, containerId, which){
var tabs=btn.parentElement.querySelectorAll(".lb-tab");
tabs.forEach(function(t){t.classList.remove("active");});
btn.classList.add("active");
document.getElementById(containerId+"-school").style.display=which==="school"?"":"none";
document.getElementById(containerId+"-global").style.display=which==="global"?"":"none";
}

function submitScore(){
var n=getInit();
if(isBanned(n)){
  sc=0;survivalBonus=0;st=0;bs=0;elapsed=0;
  var b=document.getElementById("submit-btn");
  b.textContent="SCORE WIPED";b.style.color="#ef4444";b.style.borderColor="#ef4444";b.style.pointerEvents="none";
  document.getElementById("fscore").textContent="FINAL SCORE: 0";
  document.getElementById("fstreak").textContent="Inappropriate initials \u2014 score deleted.";
  // Log the attempt to Firebase for teacher review
  getIP(function(ip){
    db.ref("flagged").push({name:n,ip:ip||"unknown",time:Date.now(),school:schoolCode||""});
  });
  return;
}
// Get IP for all submissions
getIP(function(ip){
  var total=sc+survivalBonus;
  var entry={name:n,score:total,streak:bs,level:cL?cL.name:"I",school:schoolCode||"",ip:ip||"unknown",time:Date.now()};
  saveToDB(entry).then(function(){
    var b=document.getElementById("submit-btn");b.textContent="SAVED!";b.style.pointerEvents="none";b.style.opacity=".5";
    setTimeout(function(){renderLB("go-lb",n,total);},500);
  }).catch(function(err){
    var b=document.getElementById("submit-btn");b.textContent="ERROR";b.style.color="#ef4444";
  });
});
}

function toggleMenuLB(){var el=document.getElementById("menu-lb");if(el.style.display==="block"){el.style.display="none";}else{renderLB("menu-lb");}}

function endG(){gg=true;cancelAnimationFrame(fi);var total=sc+survivalBonus;var mins=Math.floor(elapsed/60);var secs=Math.floor(elapsed%60);document.getElementById("ov1").classList.add("on");document.getElementById("ss").style.display="none";document.getElementById("gover").style.display="";document.getElementById("fscore").textContent="FINAL SCORE: "+total;document.getElementById("fstreak").textContent="Survived "+mins+":"+(secs<10?"0":"")+secs+" \u00b7 "+sc+" correct \u00b7 "+cL.label;var b=document.getElementById("submit-btn");b.textContent="SAVE SCORE";b.style.pointerEvents="";b.style.opacity="";b.style.color="";buildInit();renderLB("go-lb");}

function gLoop(){if(gg)return;var ox=0,oy=0;if(sk>0){ox=(Math.random()-.5)*8;oy=(Math.random()-.5)*8;sk--;}X.save();X.translate(ox,oy);X.clearRect(-10,-10,W+20,H+20);
elapsed=(Date.now()-gameStartTime)/1000;survivalBonus=Math.floor(elapsed);var nL=getLevel(elapsed);if(nL.name!==cL.name){cL=nL;}
uHUD();drawSky();drawEmbers();drawGround();drawVolcano();if(!qa){mP();spawnLava();uL();hitTest();}drawLava();drawPt();var isImmune=Date.now()<immuneUntil;if(!isImmune||Math.floor(Date.now()/100)%2===0){drawPlayer(plx);}X.restore();fi=requestAnimationFrame(gLoop);}

function startGame(){lv=3;sc=0;st=0;bs=0;gg=false;qa=false;lk=false;uq=[];ld=[];pt=[];sk=0;plx=W/2-PW/2;cL=levels[0];elapsed=0;survivalBonus=0;gameStartTime=Date.now();immuneUntil=0;initE();document.getElementById("ov1").classList.remove("on");document.getElementById("ov2").classList.remove("on");document.getElementById("qb").style.display="none";document.getElementById("ss").style.display="none";document.getElementById("gover").style.display="none";document.getElementById("menu-lb").style.display="none";uHUD();cancelAnimationFrame(fi);gLoop();}
</script>
</body>
